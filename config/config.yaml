project:
  title: "Intervener Complexity in Dependency Grammar: A Cross-Linguistic Computational Study"
  treebank_source: "SUD"
  release: "2.17"
  download_base_url: "https://grew.fr/download/SUD_2.17"
  output_root: "outputs"
  final_output_root: "final_outputs"
  log_root: "logs"
  random_seed: 13
  random_runs: 3
  max_sentences: null
  include_zero_distance_dependencies: false
  baselines:
    - "fully_random"
    - "projective_random"
    - "grammar_constrained"
    - "simplified"
  generate_global_report: true

complexity:
  weights:
    arity: 1.0
    subtree_size: 0.6
    depth: 0.4
    pos_weight: 0.5
  pos_weights:
    ADJ: 1.1
    ADP: 0.8
    ADV: 1.1
    AUX: 0.8
    CCONJ: 0.7
    DET: 0.8
    INTJ: 1.0
    NOUN: 1.2
    NUM: 0.9
    PART: 0.7
    PRON: 0.9
    PROPN: 1.1
    SCONJ: 0.7
    SYM: 0.5
    VERB: 1.3
    X: 1.0

contributors:
  asif:
    languages: ["marathi", "catalan", "galician", "persian", "tamil", "telugu", "indonesian"]

languages:
  - key: "marathi"
    label: "Marathi"
    corpus_id: "SUD_Marathi-UFAL"
    typology: "SOV"
    family: "Indo-Aryan"
    region: "South Asia"
    archive_ext: ".tgz"
